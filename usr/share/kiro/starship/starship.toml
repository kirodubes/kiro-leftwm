# Kiro default Starship prompt
# Docs: https://starship.rs/config/
# A clean, fast, two-line prompt with sane defaults.

# Insert a blank line between shell prompts
add_newline = true

# Prompt character: green ❯ on success, red on error
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# Current directory
[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"
read_only = " "

# Username — only shown when relevant (root, SSH, different user)
[username]
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style)@"
show_always = false

# Hostname — only shown over SSH
[hostname]
ssh_only = true
style = "bold green"
format = "[$hostname]($style) "

# Git branch
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "

# Commit hash / tag — shown in detached HEAD and when tagged
[git_commit]
commit_hash_length = 7
tag_disabled = false
tag_symbol = "  "
style = "bold green"

# In-progress operations: rebase, merge, cherry-pick, bisect, revert
[git_state]
style = "bold yellow"
format = "\\([$state( $progress_current/$progress_total)]($style)\\) "
rebase = "REBASING"
merge = "MERGING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

# Lines added/removed in the working tree
[git_metrics]
disabled = false
added_style = "bold green"
deleted_style = "bold red"
format = "([+$added]($added_style) )([-$deleted]($deleted_style) )"

# Git working-tree status — explicit symbols per state
[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "= "
ahead = "⇡${count} "
behind = "⇣${count} "
diverged = "⇕⇡${ahead_count}⇣${behind_count} "
up_to_date = ""
untracked = "? "
stashed = "$ "
modified = "! "
staged = "+ "
renamed = "» "
deleted = "✘ "

# Command duration for long-running commands
[cmd_duration]
min_time = 2000
style = "bold yellow"
format = "took [$duration]($style) "

# Exit-status indicator
[status]
disabled = false
symbol = "✘ "
style = "bold red"
format = "[$symbol$status]($style) "

# ── Language / tool versions (shown only in relevant projects) ──
[python]
symbol = " "
style = "bold yellow"

[nodejs]
symbol = " "
style = "bold green"

[rust]
symbol = " "
style = "bold red"

[package]
symbol = " "
disabled = true
